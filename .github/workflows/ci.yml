name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests benchmarks
      - name: Test + coverage gate (>= 70%)
        run: pytest --cov=secguard --cov-report=term-missing --cov-fail-under=70
      - name: Detection benchmark (gates 100% recall, 0% FPR)
        run: python -m benchmarks.detection_bench

  dogfood:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e .
      - name: Scan the repo's own tracked files for secrets
        # Exclude tests/, which deliberately contains secret-like fixtures.
        run: git ls-files | grep -vE '^tests/' | xargs secguard-scan

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t owasp-secguard:ci .
